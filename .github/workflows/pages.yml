name: Build and Deploy Web Book

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          curl -L -o /tmp/pandoc.deb https://github.com/jgm/pandoc/releases/download/3.8/pandoc-3.8-1-amd64.deb
          sudo dpkg -i /tmp/pandoc.deb
          pandoc --version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements.txt

      - name: Generate Sphinx source
        run: python scripts/build_sphinx_source.py

      - name: Build HTML
        run: |
          rm -rf docs/_build/html
          sphinx-build -E -a -b html docs/source docs/_build/html

      - name: Verify generated web output
        run: |
          set -euo pipefail
          page=docs/_build/html/generated/chapter_02.html
          html_root=docs/_build/html/generated
          test -f "$page"
          test -f docs/_build/html/_static/figures/generated/chapter_02/ch02_event_table_information.png
          ! grep -R -F 'generated/figures/generated' "$html_root"
          ! grep -R -F '$<span' "$html_root"
          ! grep -R -F '<embed' "$html_root"
          ! grep -R -F '\begin{equation}' "$html_root"
          ! grep -R -F 'ch02_event_table_information.pdf' "$html_root"
          ! grep -R -F 'reference-type=' "$html_root"
          ! grep -R -F 'data-reference-type' "$html_root"
          ! grep -R -F 'std-numref docutils literal' "$html_root"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
